<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China GDS Repository</title>
<style>
  :root { --text: #1d1d1f; --text-sec: #86868b; --accent: #0071e3; --bg: #fbfbfd; --border: #d2d2d7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100vh; display: flex; align-items: center;
    justify-content: center; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 600px; width: 100%; padding: 24px; }
  h1 { font-size: 44px; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.08; margin-bottom: 6px; }
  .subtitle { color: var(--text-sec); font-size: 17px; margin-bottom: 40px; }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: block; background: #fff; border-radius: 16px; padding: 28px 28px;
    text-decoration: none; color: var(--text); transition: all 0.2s;
    border: 0.5px solid var(--border);
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .card-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
  .card-desc { font-size: 14px; color: var(--text-sec); margin-top: 4px; line-height: 1.5; }
  .card-icon { font-size: 24px; }
</style>
</head>
<body>
<div class="container">
  <h1>China GDS</h1>
  <div class="subtitle">Repository</div>
  <div class="cards">
    <a href="updates.html" class="card">
      <div class="card-title"><span class="card-icon">📋</span> Weekly Updates</div>
      <div class="card-desc">GDS team updates, issue tracking, and operational notes</div>
    </a>
    <a href="insights.html" class="card">
      <div class="card-title"><span class="card-icon">📊</span> Premium Account SoI Trends</div>
      <div class="card-desc">Weekly SoI insights, contribution analysis, and account deep-dives</div>
    </a>
    <a href="knowledge.html" class="card">
      <div class="card-title"><span class="card-icon">📚</span> Knowledge Repository</div>
      <div class="card-desc">Playbooks, documentation, and reference links</div>
    </a>
  </div>
</div>
</body>
</html>
