<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>SoI Weekly Insights</title>
<style>
  :root { --blue: #1d4ed8; --blue-light: #3b82f6; --blue-bg: #eff6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
    min-height: 100vh; padding: 60px 40px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #fff; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .subtitle { color: rgba(255,255,255,0.7); font-size: 15px; margin-bottom: 36px; }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: block; background: #fff; border-radius: 12px; padding: 20px 24px;
    text-decoration: none; color: #111; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .card.latest { border-left: 4px solid var(--blue); background: var(--blue-bg); }
  .card-week { font-size: 18px; font-weight: 700; color: #111; display: flex; align-items: center; gap: 10px; }
  .card-desc { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .badge {
    background: var(--blue); color: #fff; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Premium Account SoI</h1>
  <div class="subtitle">Weekly Insights Reports</div>
  <div class="cards">
    
            <a href="2026-W11/weekly_insights.html" class="card latest">
              <div class="card-week">2026-W11 <span class="badge">Latest</span></div>
              <div class="card-desc">View insights report &rarr;</div>
            </a>
            <a href="2026-W09/weekly_insights.html" class="card ">
              <div class="card-week">2026-W09 </div>
              <div class="card-desc">View insights report &rarr;</div>
            </a>
            <a href="2026-W08/weekly_insights.html" class="card ">
              <div class="card-week">2026-W08 </div>
              <div class="card-desc">View insights report &rarr;</div>
            </a>
            <a href="2026-W07/weekly_insights.html" class="card ">
              <div class="card-week">2026-W07 </div>
              <div class="card-desc">View insights report &rarr;</div>
            </a>
  </div>
</div>
</body>
</html>
