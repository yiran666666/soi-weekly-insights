<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Repository — China GDS</title>
<style>
  :root { --text: #1d1d1f; --text-sec: #86868b; --accent: #0071e3; --bg: #fbfbfd; --border: #d2d2d7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased;
    padding: 60px 24px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  .back { font-size: 14px; color: var(--accent); text-decoration: none; }
  .back:hover { text-decoration: underline; }
  h1 { font-size: 34px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin: 24px 0 32px; }
  .cards { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 32px; }
  .card { display: flex; align-items: center; background: #fff; padding: 20px 24px; text-decoration: none; color: var(--text); transition: background 0.15s; }
  .card:hover { background: #f5f5f7; }
  .card-body { flex: 1; }
  .card-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .card-desc { font-size: 13px; color: var(--text-sec); margin-top: 2px; }
  .card-icon { font-size: 20px; }
  .card-actions { display: flex; gap: 4px; }
  .card-actions button { background: none; border: none; cursor: pointer; padding: 4px 8px; font-size: 13px; color: var(--text-sec); border-radius: 6px; font-family: inherit; }
  .card-actions button:hover { background: #f0f0f5; color: var(--text); }
  .card-actions .delete-btn:hover { color: #ff3b30; }

  .fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: 50px; border: none;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(0,113,227,0.4);
    transition: all 0.15s;
  }
  .fab:hover { background: #0062cc; transform: translateY(-1px); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 18px; padding: 32px; width: 480px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .modal input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; margin-bottom: 16px; outline: none; }
  .modal input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .modal-actions button { padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
  .btn-cancel { background: #f0f0f5; color: var(--text); }
  .btn-cancel:hover { background: #e5e5ea; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #0062cc; }
  .error-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 2000; display: none; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">&larr; China GDS</a>
  <h1>Knowledge Repository</h1>
  <div class="cards" id="all-resources"></div>
  <div id="user-badge-container"></div>
</div>

<button class="fab" onclick="openAddModal()">+ Contribute</button>

<div class="modal-overlay" id="content-modal">
  <div class="modal">
    <h2 id="modal-title">Add Resource</h2>
    <label>Title</label>
    <input type="text" id="input-title" placeholder="e.g. Campaign Playbook">
    <label>URL</label>
    <input type="text" id="input-url" placeholder="https://...">
    <label>Description</label>
    <input type="text" id="input-desc" placeholder="Short description">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-btn" onclick="saveResource()">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h2>Delete Resource</h2>
    <p style="color:var(--text-sec);font-size:15px;margin-bottom:20px;">Remove this resource?</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-primary" style="background:#ff3b30;" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="error-toast" id="error-toast"></div>

<script src="auth.js"></script>
<script>
const SECTION_KEY = 'knowledge';

// Built-in resources (always shown)
const BUILTIN = [
  { icon: '📚', title: 'GDS Knowledge Center', desc: 'Notion — processes, playbooks, and team resources', url: 'https://www.notion.so/moloco/GDS-Knowledge-Center-2b2cdb35133680e3898ed4bf1a11e1c1' },
  { icon: '⚙️', title: 'ML + Bidder Operational Hub', desc: 'Google Doc — ML and bidder operations reference', url: 'https://docs.google.com/document/d/1tBSbWthgzOWPozZUGnJ13FsIpLf208o20eB2Z8p7URQ/edit?tab=t.0' },
];

let userItems = [];
let editingId = null;
let deletingId = null;

function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

async function loadResources() {
  try {
    const res = await fetch(`/api/content/${SECTION_KEY}`);
    userItems = await res.json();
  } catch { userItems = []; }
  renderAll();
}

function renderAll() {
  const container = document.getElementById('all-resources');
  const user = getCurrentUser();

  // Built-in cards
  const builtinHtml = BUILTIN.map(b => `
    <a href="${b.url}" class="card" target="_blank">
      <div class="card-body">
        <div class="card-title"><span class="card-icon">${b.icon}</span> ${b.title}</div>
        <div class="card-desc">${b.desc} &rarr;</div>
      </div>
    </a>`).join('');

  // User cards — same style, seamless
  const userHtml = userItems.map(item => {
    const url = item.body || '#';
    const mine = isOwner(item.author);
    return `
      <div class="card" style="cursor:default;">
        <a href="${escapeAttr(url)}" target="_blank" style="flex:1;text-decoration:none;color:inherit;">
          <div class="card-body">
            <div class="card-title"><span class="card-icon">🔗</span> ${esc(item.title)}</div>
            <div class="card-desc">${esc(item.body || '')} · @${esc(item.author)} &rarr;</div>
          </div>
        </a>
        ${mine ? `<div class="card-actions">
          <button onclick="openEditModal('${item.id}')">Edit</button>
          <button class="delete-btn" onclick="openDeleteModal('${item.id}')">Delete</button>
        </div>` : ''}
      </div>`;
  }).join('');

  container.innerHTML = builtinHtml + userHtml;
}

window.openAddModal = function() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Resource';
  document.getElementById('save-btn').textContent = 'Add';
  document.getElementById('input-title').value = '';
  document.getElementById('input-url').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('content-modal').classList.add('open');
};

window.openEditModal = function(id) {
  const item = userItems.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Resource';
  document.getElementById('save-btn').textContent = 'Save';
  document.getElementById('input-title').value = item.title;
  document.getElementById('input-url').value = item.body || '';
  document.getElementById('input-desc').value = '';
  document.getElementById('content-modal').classList.add('open');
};

window.closeModal = function() { document.getElementById('content-modal').classList.remove('open'); };

window.saveResource = async function() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }
  const payload = { title, body: document.getElementById('input-url').value.trim(), author: getCurrentUser() };
  const headers = { 'Content-Type': 'application/json', ...authHeaders() };
  let res;
  if (editingId) {
    res = await fetch(`/api/content/${SECTION_KEY}/${editingId}`, { method: 'PUT', headers, body: JSON.stringify(payload) });
  } else {
    res = await fetch(`/api/content/${SECTION_KEY}`, { method: 'POST', headers, body: JSON.stringify(payload) });
  }
  if (!res.ok) { showError((await res.json()).error || 'Failed'); return; }
  closeModal();
  await loadResources();
};

window.openDeleteModal = function(id) { deletingId = id; document.getElementById('delete-modal').classList.add('open'); };
window.closeDeleteModal = function() { document.getElementById('delete-modal').classList.remove('open'); };
window.confirmDelete = async function() {
  if (!deletingId) return;
  const res = await fetch(`/api/content/${SECTION_KEY}/${deletingId}`, { method: 'DELETE', headers: authHeaders() });
  if (!res.ok) { showError((await res.json()).error || 'Failed'); closeDeleteModal(); return; }
  closeDeleteModal(); await loadResources();
};

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escapeAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

ensureUser().then(() => {
  loadResources();
  renderUserBadge('#user-badge-container');
  if (new URLSearchParams(window.location.search).get('contribute') === 'true') {
    setTimeout(() => openAddModal(), 200);
  }
});
</script>
</body>
</html>
