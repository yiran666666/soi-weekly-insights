<head>

<title>Knowledge Repository — China GDS</title>
<style>
  :root { --text: #1d1d1f; --text-sec: #86868b; --accent: #0071e3; --bg: #fbfbfd; --border: #d2d2d7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased;
    padding: 60px 24px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  .back { font-size: 14px; color: var(--accent); text-decoration: none; }
  .back:hover { text-decoration: underline; }
  h1 { font-size: 34px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin: 24px 0 32px; }
  .cards { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 14px; overflow: hidden; }
  .card {
    display: block; background: #fff; padding: 20px 24px;
    text-decoration: none; color: var(--text); transition: background 0.15s;
  }
  .card:hover { background: #f5f5f7; }
  .card-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .card-desc { font-size: 13px; color: var(--text-sec); margin-top: 2px; }
  .card-icon { font-size: 20px; }
</style>
</head>
