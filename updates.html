<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Updates — China GDS</title>
<style>
  :root { --text: #1d1d1f; --text-sec: #86868b; --accent: #0071e3; --bg: #fbfbfd;
          --border: #d2d2d7; --sidebar-w: 240px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100vh;
    background: #fff; border-right: 0.5px solid var(--border);
    overflow-y: auto; padding: 20px 0; position: sticky; top: 0;
  }
  .sidebar-brand {
    font-size: 13px; font-weight: 600; color: var(--text-sec);
    padding: 0 20px 16px; letter-spacing: -0.1px;
  }
  .sidebar-brand a { color: var(--text-sec); text-decoration: none; }
  .sidebar-brand a:hover { color: var(--accent); }
  .sidebar a.item {
    display: block; padding: 10px 20px; font-size: 14px; font-weight: 500;
    color: var(--text); text-decoration: none; border-left: 3px solid transparent;
    transition: all 0.12s;
  }
  .sidebar a.item:hover { background: #f5f5f7; }
  .sidebar a.item.active { background: #f0f0f5; border-left-color: var(--accent); color: var(--accent); }
  .sidebar .item-sub { font-size: 11px; color: var(--text-sec); margin-top: 1px; }
  .content { flex: 1; height: 100vh; overflow: hidden; }
  .content iframe { width: 100%; height: 100%; border: none; }
  .content .empty {
    display: flex; align-items: center; justify-content: center; height: 100%;
    color: var(--text-sec); font-size: 17px;
  }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-brand"><a href="index.html">&larr; China GDS</a></div>
    <div style="padding:0 20px 12px;font-size:17px;font-weight:600;color:#1d1d1f;">Weekly Updates</div>
    <a class="item" href="https://docs.google.com/document/d/e/2PACX-1vQ44s5nol6eR5ObE-_TD7pW9ApbqWrQP-jHOhVYy0U7jh4F0am0yyLXQnxRcsCuPrqIBGS9grEyloPl/pub" target="_blank" style="color:#0071e3;font-size:13px;">View Full Doc &rarr;</a>
    <a class="item active" href="#" onclick="loadUpdate('2026-03-09', this); return false;">W11</a>
<a class="item " href="#" onclick="loadUpdate('2026-03-02', this); return false;">W10</a>
<a class="item " href="#" onclick="loadUpdate('2026-02-09', this); return false;">W07</a>
<a class="item " href="#" onclick="loadUpdate('2026-01-30', this); return false;">W05</a>
<a class="item " href="#" onclick="loadUpdate('2026-01-18', this); return false;">W03</a>
  </div>
  <div class="content" id="content">
    <iframe id="viewer" src="updates/2026-03-09.html"></iframe>
  </div>
</div>
<script>
function loadUpdate(dt, el) {
  document.getElementById('viewer').src = 'updates/' + dt + '.html';
  document.querySelectorAll('.sidebar a.item').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
