<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Updates — China GDS</title>
<style>
  :root { --text: #1d1d1f; --text-sec: #86868b; --accent: #0071e3; --bg: #fbfbfd;
          --border: #d2d2d7; --sidebar-w: 240px; --topbar-h: 44px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: var(--topbar-h); background: rgba(251,251,253,0.8);
    backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .topbar a {
    font-size: 14px; font-weight: 500; color: var(--accent); text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .topbar a:hover { text-decoration: underline; }
  .layout { display: flex; height: calc(100vh - var(--topbar-h)); margin-top: var(--topbar-h); }
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100%;
    background: #fff; border-right: 0.5px solid var(--border);
    overflow-y: auto; padding: 16px 0;
  }
  .sidebar-title {
    font-size: 13px; font-weight: 600; color: var(--text-sec);
    padding: 0 20px 12px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .sidebar a.item {
    display: block; padding: 10px 20px; font-size: 14px; font-weight: 500;
    color: var(--text); text-decoration: none; border-left: 3px solid transparent;
    transition: all 0.12s;
  }
  .sidebar a.item:hover { background: #f5f5f7; }
  .sidebar a.item.active { background: #f0f0f5; border-left-color: var(--accent); color: var(--accent); }
  .content { flex: 1; height: 100%; overflow: hidden; }
  .content iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<div class="topbar"><a href="index.html">&larr; Back to Main Page</a></div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Weekly Updates</div>
    <a class="item active" href="#" onclick="loadUpdate('2026-03-16', this); return false;">2026 W12 <span style="background:#0071e3;color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:4px;">Latest</span></a>
<a class="item " href="#" onclick="loadUpdate('2026-03-09', this); return false;">2026 W11</a>
<a class="item " href="#" onclick="loadUpdate('2026-03-02', this); return false;">2026 W10</a>
<a class="item " href="#" onclick="loadUpdate('2026-02-09', this); return false;">2026 W07</a>
<a class="item " href="#" onclick="loadUpdate('2026-01-30', this); return false;">2026 W05</a>
<a class="item " href="#" onclick="loadUpdate('2026-01-18', this); return false;">2026 W03</a>
  </div>
  <div class="content" id="content">
    <iframe id="viewer" src="updates/2026-03-16.html"></iframe>
  </div>
</div>
<script>
function loadUpdate(dt, el) {
  document.getElementById('viewer').src = 'updates/' + dt + '.html';
  document.querySelectorAll('.sidebar a.item').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
